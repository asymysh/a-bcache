name: Build a-bcache

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    name: Build (${{ matrix.os }}, ${{ matrix.cc }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        cc: [gcc, clang]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            uuid-dev \
            libblkid-dev \
            ${{ matrix.cc }}

      - name: Build all (default warnings)
        env:
          CC: ${{ matrix.cc }}
        run: |
          make all
          ls -la a-bcached make-bcache probe-bcache bcache-super-show

      - name: Strict warnings check for a-bcached.c
        env:
          CC: ${{ matrix.cc }}
        # We isolate the strict check to a-bcached.c because the existing
        # upstream bcache.c sources have pre-existing -Wpedantic issues
        # unrelated to this fork.
        # Feature-test macros (_GNU_SOURCE, _FILE_OFFSET_BITS) are defined
        # inside a-bcached.c itself.
        run: |
          ${{ matrix.cc }} \
            -O2 -Wall -Wextra -Wpedantic -Werror \
            -Wformat=2 -Wshadow -Wcast-align -Wconversion \
            -Wno-sign-conversion \
            -g -o /tmp/a-bcached-strict a-bcached.c
          ls -la /tmp/a-bcached-strict

      - name: Quick smoke test
        run: |
          # --help should succeed and not return error
          ./a-bcached --help
          # With no bcache devices we expect a clean exit failure with
          # an informative message, not a crash.
          if ./a-bcached --dry-run --foreground --verbose 2>&1; then
            echo "Unexpected: succeeded without bcache devices"
            exit 1
          fi
          echo "OK: cleanly failed with no bcache devices (as expected)"

      - name: Static analysis (cppcheck)
        run: |
          sudo apt-get install -y cppcheck
          cppcheck \
            --enable=warning,style,performance,portability \
            --error-exitcode=1 \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            a-bcached.c

  shellcheck:
    name: ShellCheck test scripts
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shellcheck test/setup-mock-devices.sh
          shellcheck test/test-spin-management.sh
